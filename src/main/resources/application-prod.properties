# ============================================
# Perfil: producción (prod)
# Uso: -Dquarkus.profile=prod o QUARKUS_PROFILE=prod
# Nunca commitear credenciales; usar variables de entorno.
# ============================================

# Servidor HTTP (puerto/host suelen venir del contenedor o variable)
quarkus.http.port=${QUARKUS_HTTP_PORT:8080}
quarkus.http.host=${QUARKUS_HTTP_HOST:0.0.0.0}

# CORS restringido solo a dominios de producción
quarkus.http.cors=true
quarkus.http.cors.origins=${CORS_ORIGINS:https://gestiondocumental.iess.gob.ec}
quarkus.http.cors.headers=accept,authorization,content-type,x-requested-with,ec-iess-organization-id,ec-iess-role-identifier,ec-iess-role-id,x-operador-id
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS,PATCH

# Swagger UI deshabilitado en producción (seguridad)
quarkus.swagger-ui.always-include=false

# Logging: menos verboso en producción (Fase 1)
quarkus.log.level=INFO
quarkus.log.category."ec.gob.iess".level=WARN
quarkus.log.category."ec.gob.iess.gestiondocumental".level=WARN
quarkus.hibernate-orm.log.sql=false
quarkus.hibernate-orm.log.bind-parameters=false

# Base de datos: SOLO variables de entorno (no dejar credenciales por defecto)
quarkus.datasource.db-kind=oracle
quarkus.datasource.username=${QUARKUS_DATASOURCE_USERNAME}
quarkus.datasource.password=${QUARKUS_DATASOURCE_PASSWORD}
quarkus.datasource.jdbc.url=${QUARKUS_DATASOURCE_JDBC_URL}

# ============================================
# Perfil: desarrollo (dev)
# Uso: mvn quarkus:dev (por defecto) o -Dquarkus.profile=dev
# ============================================

# Servidor HTTP
quarkus.http.port=8080
quarkus.http.host=0.0.0.0

# CORS abierto para desarrollo (localhost, frontend local)
quarkus.http.cors=true
quarkus.http.cors.origins=http://localhost:8080,http://127.0.0.1:8080,http://localhost:3002,http://localhost:3000
quarkus.http.cors.headers=accept,authorization,content-type,x-requested-with,ec-iess-organization-id,ec-iess-role-identifier,ec-iess-role-id,x-operador-id
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS,PATCH

# Swagger UI visible en desarrollo
quarkus.swagger-ui.always-include=true

# Logging más verboso para depuración (Fase 1: trazas DEBUG solo en dev)
quarkus.log.level=INFO
quarkus.log.category."ec.gob.iess".level=DEBUG
quarkus.log.category."ec.gob.iess.gestiondocumental".level=DEBUG
quarkus.hibernate-orm.log.sql=false
quarkus.hibernate-orm.log.bind-parameters=false

# Base de datos Oracle - desarrollo (puedes usar variables de entorno para no commitear)
quarkus.datasource.db-kind=oracle
quarkus.datasource.username=DOCUMENTAL_OWNER
quarkus.datasource.password=DOC87desa
quarkus.datasource.jdbc.url=jdbc:oracle:thin:@192.168.29.208:1539/PDBIESS_DESA?oracle.net.CONNECT_TIMEOUT=15000&oracle.jdbc.ReadTimeout=30000

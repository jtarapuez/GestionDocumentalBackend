# ============================================
# Perfil: calidad
# Uso: -Dquarkus.profile=calidad o QUARKUS_PROFILE=calidad
# ============================================

# Servidor HTTP (puerto por variable en servidor: QUARKUS_HTTP_PORT)
quarkus.http.port=8080
quarkus.http.host=0.0.0.0

# CORS: orígenes permitidos del ambiente de calidad (ajustar URLs según despliegue)
quarkus.http.cors=true
quarkus.http.cors.origins=${CORS_ORIGINS:http://localhost:8080,http://localhost:3000,https://calidad.gestiondocumental.iess.gob.ec}
quarkus.http.cors.headers=accept,authorization,content-type,x-requested-with,ec-iess-organization-id,ec-iess-role-identifier,ec-iess-role-id,x-operador-id
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS,PATCH

# Swagger UI habilitado en calidad para pruebas (opcional: poner false si no se desea exponer)
quarkus.swagger-ui.always-include=true

# Logging: INFO, menos detalle que dev (Fase 1)
quarkus.log.level=INFO
quarkus.log.category."ec.gob.iess".level=INFO
quarkus.log.category."ec.gob.iess.gestiondocumental".level=INFO
quarkus.hibernate-orm.log.sql=false
quarkus.hibernate-orm.log.bind-parameters=false

# Base de datos: preferir variables de entorno en el servidor
# Ejemplo: QUARKUS_DATASOURCE_USERNAME, QUARKUS_DATASOURCE_PASSWORD, QUARKUS_DATASOURCE_JDBC_URL
quarkus.datasource.db-kind=oracle
quarkus.datasource.username=${QUARKUS_DATASOURCE_USERNAME:DOCUMENTAL_OWNER}
quarkus.datasource.password=${QUARKUS_DATASOURCE_PASSWORD:}
quarkus.datasource.jdbc.url=${QUARKUS_DATASOURCE_JDBC_URL:jdbc:oracle:thin:@localhost:1521/ORCL?oracle.net.CONNECT_TIMEOUT=15000&oracle.jdbc.ReadTimeout=30000}

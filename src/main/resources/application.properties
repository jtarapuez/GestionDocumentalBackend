# ============================================
# Configuración base - Sistema de Gestión Documental
# Estándar: PAS-EST-043
# ============================================
# Perfiles: dev (desarrollo) | calidad | prod (producción)
# Activar: -Dquarkus.profile=calidad o QUARKUS_PROFILE=prod
# Por defecto se usa "dev" en desarrollo local.
quarkus.profile=dev

# Información de la aplicación (común a todos los ambientes)
quarkus.application.name=gestion-documental-backend
quarkus.application.version=1.0.0-SNAPSHOT

# OpenAPI/Swagger (título común; habilitación por perfil)
quarkus.smallrye-openapi.info-title=Sistema de Gestión Documental API
quarkus.smallrye-openapi.info-version=1.0.0
quarkus.smallrye-openapi.info-description=API del Sistema de Gestión Documental del IESS - Backend Quarkus siguiendo el estándar PAS-EST-043
quarkus.smallrye-openapi.path=/openapi

# Swagger UI (path común; always-include por perfil)
quarkus.swagger-ui.path=/swagger-ui

# Health Checks (común)
quarkus.smallrye-health.ui.enable=true

# Hibernate ORM (común)
quarkus.hibernate-orm.database.generation=none
quarkus.hibernate-orm.dialect=org.hibernate.dialect.OracleDialect

# Flyway (común; habilitación por perfil si se requiere)
quarkus.flyway.enabled=false
quarkus.flyway.migrate-at-start=false
quarkus.flyway.baseline-on-migrate=true
quarkus.flyway.locations=classpath:db/migration

# Connection pool (valores base; cada perfil puede sobreescribir)
quarkus.datasource.jdbc.initial-size=0
quarkus.datasource.jdbc.min-size=1
quarkus.datasource.jdbc.max-size=10
quarkus.datasource.jdbc.acquisition-timeout=30
quarkus.datasource.jdbc.background-validation-interval=PT10M
quarkus.datasource.jdbc.idle-removal-interval=PT10M
quarkus.datasource.jdbc.max-lifetime=PT1H
quarkus.datasource.jdbc.validation-query-sql=SELECT 1 FROM DUAL

# Logging base: INFO. Perfil dev → DEBUG para ec.gob.iess (ver application-dev.properties);
# prod → WARN para ec.gob.iess (ver application-prod.properties). Fase 1 – observabilidad.
quarkus.log.level=INFO
